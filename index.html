<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Traffic Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --bg-grass: #2d5a27;
            --road-color: #333;
            --road-line: #fff;
            --ui-bg: rgba(255, 255, 255, 0.1);
            --ui-blur: 12px;
            --text-color: #fff;
            --primary: #4cc9f0;
            --danger: #f72585;
            --success: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1000px;
            max-height: 800px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            background-color: var(--bg-grass);
            overflow: hidden;
            border-radius: 12px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-card {
            background: var(--ui-bg);
            backdrop-filter: blur(var(--ui-blur));
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            font-weight: 700;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
        }

        .stat-value.urgent {
            color: var(--danger);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 20px;
        }

        #overlay h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        #overlay p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #3f37c9);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: auto;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .hidden {
            display: none !important;
        }

        #notification {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: #000;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 900;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        #notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-20px);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="hud">
            <div class="stat-card">
                <span class="stat-label">Level</span>
                <span id="level-val" class="stat-value">1</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Time Left</span>
                <span id="time-val" class="stat-value">60</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Score</span>
                <span id="score-val" class="stat-value">0</span>
            </div>
        </div>

        <div id="overlay">
            <h1 id="title">Crazy Traffic</h1>
            <p id="description">Controle os semáforos clicando neles. Não deixe os carros baterem!</p>
            <button id="start-btn" class="btn" onclick="handleStartClick()">Começar Jogo</button>
        </div>

        <div id="notification">Level Up!</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const timeEl = document.getElementById('time-val');
        const levelEl = document.getElementById('level-val');
        const overlay = document.getElementById('overlay');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('description');
        const startBtn = document.getElementById('start-btn');
        const notification = document.getElementById('notification');

        const ROAD_WIDTH = 120;
        const LIGHT_RADIUS = 15;
        const CAR_WIDTH = 30;
        const CAR_HEIGHT = 50;

        let gameState = 'MENU';
        let score = 0;
        let timeLeft = 60;
        let level = 1;
        let spawnRate = 2000;
        let lastSpawnTime = 0;
        let lastTimeTick = 0;
        let cars = [];
        let trafficLights = [];

        function resize() {
            const container = document.getElementById('game-container');
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            initTrafficLights();
        }

        window.addEventListener('resize', resize);
        resize();

        function handleStartClick() {
            resize(); // Garante o tamanho correto no momento do play
            startGame();
        }

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            timeLeft = 60;
            level = 1;
            spawnRate = 2000;
            cars = [];
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            levelEl.innerText = level;
            timeEl.classList.remove('urgent');
            overlay.classList.add('hidden');

            const now = performance.now();
            lastSpawnTime = now - spawnRate; // Força spawn imediato
            lastTimeTick = now;
            initTrafficLights();
        }

        function initTrafficLights() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const off = ROAD_WIDTH / 2 + 30;
            trafficLights = [
                { x: cx - off, y: cy + ROAD_WIDTH / 2 + 20, dir: 'N', state: 'RED' },
                { x: cx + off, y: cy - ROAD_WIDTH / 2 - 20, dir: 'S', state: 'RED' },
                { x: cx - ROAD_WIDTH / 2 - 20, y: cy - off, dir: 'E', state: 'RED' },
                { x: cx + ROAD_WIDTH / 2 + 20, y: cy + off, dir: 'W', state: 'RED' }
            ];
        }

        function drawMap() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Grama
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estradas
            ctx.fillStyle = '#333';
            ctx.fillRect(cx - ROAD_WIDTH / 2, 0, ROAD_WIDTH, canvas.height);
            ctx.fillRect(0, cy - ROAD_WIDTH / 2, canvas.width, ROAD_WIDTH);

            // Faixas brancas
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(cx, 0); ctx.lineTo(cx, cy - ROAD_WIDTH / 2);
            ctx.moveTo(cx, cy + ROAD_WIDTH / 2); ctx.lineTo(cx, canvas.height);
            ctx.moveTo(0, cy); ctx.lineTo(cx - ROAD_WIDTH / 2, cy);
            ctx.moveTo(cx + ROAD_WIDTH / 2, cy); ctx.lineTo(canvas.width, cy);
            ctx.stroke();

            // Faixas de Pare
            ctx.setLineDash([]);
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.moveTo(cx - ROAD_WIDTH / 2, cy + ROAD_WIDTH / 2); ctx.lineTo(cx, cy + ROAD_WIDTH / 2);
            ctx.moveTo(cx, cy - ROAD_WIDTH / 2); ctx.lineTo(cx + ROAD_WIDTH / 2, cy - ROAD_WIDTH / 2);
            ctx.moveTo(cx - ROAD_WIDTH / 2, cy); ctx.lineTo(cx - ROAD_WIDTH / 2, cy - ROAD_WIDTH / 2);
            ctx.moveTo(cx + ROAD_WIDTH / 2, cy); ctx.lineTo(cx + ROAD_WIDTH / 2, cy + ROAD_WIDTH / 2);
            ctx.stroke();
        }

        class Car {
            constructor(x, y, dx, dy, color) {
                this.x = x; this.y = y; this.dx = dx; this.dy = dy;
                this.color = color;
                this.speed = 2.2 + (level * 0.4);
                this.w = dx !== 0 ? CAR_HEIGHT : CAR_WIDTH;
                this.h = dy !== 0 ? CAR_HEIGHT : CAR_WIDTH;
                this.stopped = false;
                this.passedStopLine = false;
            }

            update() {
                let shouldStop = false;
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                // Semáforos
                trafficLights.forEach(l => {
                    let d = Infinity;
                    if (l.dir === 'N' && this.dy < 0 && Math.abs(this.x - (cx - ROAD_WIDTH / 4)) < 10) d = this.y - (cy + ROAD_WIDTH / 2);
                    if (l.dir === 'S' && this.dy > 0 && Math.abs(this.x - (cx + ROAD_WIDTH / 4)) < 10) d = (cy - ROAD_WIDTH / 2) - this.y;
                    if (l.dir === 'E' && this.dx > 0 && Math.abs(this.y - (cy + ROAD_WIDTH / 4)) < 10) d = (cx - ROAD_WIDTH / 2) - this.x;
                    if (l.dir === 'W' && this.dx < 0 && Math.abs(this.y - (cy - ROAD_WIDTH / 4)) < 10) d = this.x - (cx + ROAD_WIDTH / 2);

                    if (d > 0 && d < 70) {
                        if (l.state === 'RED') shouldStop = true;
                        else this.passedStopLine = true;
                    }
                });

                // Carro na frente
                cars.forEach(o => {
                    if (o === this) return;
                    let d = Infinity;
                    if (this.dx === o.dx && this.dy === o.dy) {
                        if (this.dy < 0) d = this.y - o.y;
                        else if (this.dy > 0) d = o.y - this.y;
                        else if (this.dx > 0) d = o.x - this.x;
                        else if (this.dx < 0) d = this.x - o.x;
                    }
                    if (d > 0 && d < 60) shouldStop = true;
                });

                this.stopped = shouldStop;
                if (!this.stopped) {
                    this.x += this.dx * this.speed;
                    this.y += this.dy * this.speed;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(-this.w / 2 + 4, -this.h / 2 + 4, this.w, this.h);
                ctx.fillStyle = this.color;

                // Desenho arredondado compatível
                const r = 6;
                ctx.beginPath();
                ctx.moveTo(-this.w / 2 + r, -this.h / 2);
                ctx.lineTo(this.w / 2 - r, -this.h / 2);
                ctx.quadraticCurveTo(this.w / 2, -this.h / 2, this.w / 2, -this.h / 2 + r);
                ctx.lineTo(this.w / 2, this.h / 2 - r);
                ctx.quadraticCurveTo(this.w / 2, this.h / 2, this.w / 2 - r, this.h / 2);
                ctx.lineTo(-this.w / 2 + r, this.h / 2);
                ctx.quadraticCurveTo(-this.w / 2, this.h / 2, -this.w / 2, this.h / 2 - r);
                ctx.lineTo(-this.w / 2, -this.h / 2 + r);
                ctx.quadraticCurveTo(-this.w / 2, -this.h / 2, -this.w / 2 + r, -this.h / 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawnCar() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const d = [
                { x: cx - ROAD_WIDTH / 4, y: canvas.height + 50, dx: 0, dy: -1, c: '#4cc9f0' },
                { x: cx + ROAD_WIDTH / 4, y: -50, dx: 0, dy: 1, c: '#f72585' },
                { x: -50, y: cy + ROAD_WIDTH / 4, dx: 1, dy: 0, c: '#4ade80' },
                { x: canvas.width + 50, y: cy - ROAD_WIDTH / 4, dx: -1, dy: 0, c: '#ffb703' }
            ];
            const s = d[Math.floor(Math.random() * 4)];
            cars.push(new Car(s.x, s.y, s.dx, s.dy, s.c));
        }

        function update(time) {
            if (gameState === 'PLAYING') {
                if (time - lastTimeTick > 1000) {
                    timeLeft--; lastTimeTick = time; timeEl.innerText = timeLeft;
                    if (timeLeft <= 10) timeEl.classList.add('urgent');
                    if (timeLeft <= 0) nextLevel();
                }
                if (time - lastSpawnTime > spawnRate) { spawnCar(); lastSpawnTime = time; }

                for (let i = cars.length - 1; i >= 0; i--) {
                    const c = cars[i]; c.update();
                    for (let j = i - 1; j >= 0; j--) {
                        if (Math.abs(c.x - cars[j].x) < 25 && Math.abs(c.y - cars[j].y) < 25) gameOver();
                    }
                    if (c.x < -100 || c.x > canvas.width + 100 || c.y < -100 || c.y > canvas.height + 100) {
                        cars.splice(i, 1); score++; scoreEl.innerText = score;
                    }
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMap();
            cars.forEach(c => c.draw());
            trafficLights.forEach(l => {
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(l.x, l.y, LIGHT_RADIUS + 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = l.state === 'RED' ? '#ff3333' : '#33ff33';
                ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(l.x, l.y, LIGHT_RADIUS, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function nextLevel() {
            level++; timeLeft = 60; spawnRate = Math.max(500, spawnRate * 0.85);
            levelEl.innerText = level; notification.innerText = `Level ${level}!`;
            notification.classList.add('show'); setTimeout(() => notification.classList.remove('show'), 2000);
        }

        function gameOver() {
            gameState = 'GAMEOVER'; overlay.classList.remove('hidden');
            titleEl.innerText = "GAME OVER"; titleEl.style.color = "var(--danger)";
            descEl.innerText = `Pontuação final: ${score} carros!`;
            startBtn.innerText = "Tentar Novamente";
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
            trafficLights.forEach(l => {
                if (Math.hypot(mx - l.x, my - l.y) < LIGHT_RADIUS + 15) l.state = (l.state === 'RED' ? 'GREEN' : 'RED');
            });
        });

        requestAnimationFrame(update);
    </script>
</body>

</html>
