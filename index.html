<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Traffic Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --bg-grass: #2d5a27;
            --road-color: #333;
            --ui-bg: rgba(255, 255, 255, 0.1);
            --text-color: #fff;
            --primary: #4cc9f0;
            --danger: #f72585;
            --success: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1000px;
            max-height: 800px;
            background-color: var(--bg-grass);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-card {
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            min-width: 120px;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
        }

        .stat-value.urgent {
            color: var(--danger);
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 20px;
        }

        #overlay h1 {
            font-size: 4rem;
            margin-bottom: 5px;
            background: linear-gradient(45deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        #overlay p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
            opacity: 0.9;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #3f37c9);
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        #notification {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: #000;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 900;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
        }

        #notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-20px);
            transition: 0.3s;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="hud">
            <div class="stat-card">
                <div class="stat-label">Level</div>
                <div id="level-val" class="stat-value">1</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Time Left</div>
                <div id="time-val" class="stat-value">60</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div id="score-val" class="stat-value">0</div>
            </div>
        </div>

        <div id="overlay">
            <h1 id="title">Crazy Traffic</h1>
            <p id="description">Controle os semáforos clicando neles. Evite colisões!</p>
            <button class="btn" onclick="startGame()">Começar Jogo</button>
        </div>

        <div id="notification">Level Up!</div>
        <canvas id="gameCanvas" width="1000" height="800"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const timeEl = document.getElementById('time-val');
        const levelEl = document.getElementById('level-val');
        const overlay = document.getElementById('overlay');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('description');
        const notification = document.getElementById('notification');

        // Constantes do mundo fixo (1000x800)
        const W = 1000;
        const H = 800;
        const ROAD_W = 140;
        const LIGHT_R = 18;
        const CAR_W = 34;
        const CAR_H = 55;

        let gameState = 'MENU';
        let score = 0;
        let timeLeft = 60;
        let level = 1;
        let spawnRate = 2200;
        let lastSpawn = 0;
        let lastTick = 0;
        let cars = [];
        let lights = [];

        function initLights() {
            const cx = W / 2;
            const cy = H / 2;
            const off = ROAD_W / 2 + 35;
            lights = [
                { x: cx - off, y: cy + ROAD_W / 2 + 25, dir: 'N', state: 'RED' },
                { x: cx + off, y: cy - ROAD_W / 2 - 25, dir: 'S', state: 'RED' },
                { x: cx - ROAD_W / 2 - 25, y: cy - off, dir: 'E', state: 'RED' },
                { x: cx + ROAD_W / 2 + 25, y: cy + off, dir: 'W', state: 'RED' }
            ];
        }

        function startGame() {
            gameState = 'PLAYING';
            score = 0; timeLeft = 60; level = 1; spawnRate = 2200;
            cars = [];
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            levelEl.innerText = level;
            overlay.classList.add('hidden');
            lastTick = performance.now();
            lastSpawn = 0;
            initLights();
        }

        function drawMap() {
            const cx = W / 2;
            const cy = H / 2;

            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = '#333';
            ctx.fillRect(cx - ROAD_W / 2, 0, ROAD_W, H);
            ctx.fillRect(0, cy - ROAD_W / 2, W, ROAD_W);

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(cx, 0); ctx.lineTo(cx, cy - ROAD_W / 2);
            ctx.moveTo(cx, cy + ROAD_W / 2); ctx.lineTo(cx, H);
            ctx.moveTo(0, cy); ctx.lineTo(cx - ROAD_W / 2, cy);
            ctx.moveTo(cx + ROAD_W / 2, cy); ctx.lineTo(W, cy);
            ctx.stroke();

            ctx.setLineDash([]);
            ctx.lineWidth = 5;
            ctx.strokeStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath();
            ctx.moveTo(cx - ROAD_W / 2, cy + ROAD_W / 2); ctx.lineTo(cx, cy + ROAD_W / 2);
            ctx.moveTo(cx, cy - ROAD_W / 2); ctx.lineTo(cx + ROAD_W / 2, cy - ROAD_W / 2);
            ctx.moveTo(cx - ROAD_W / 2, cy); ctx.lineTo(cx - ROAD_W / 2, cy - ROAD_W / 2);
            ctx.moveTo(cx + ROAD_W / 2, cy); ctx.lineTo(cx + ROAD_W / 2, cy + ROAD_W / 2);
            ctx.stroke();
        }

        class Car {
            constructor(x, y, dx, dy, color) {
                this.x = x; this.y = y; this.dx = dx; this.dy = dy;
                this.color = color;
                this.speed = 2.4 + (level * 0.4);
                this.w = dx !== 0 ? CAR_H : CAR_W;
                this.h = dy !== 0 ? CAR_H : CAR_W;
                this.stopped = false;
                this.passedLine = false;
            }

            update() {
                let stop = false;
                const cx = W / 2; const cy = H / 2;

                lights.forEach(l => {
                    let d = Infinity;
                    if (l.dir === 'N' && this.dy < 0 && Math.abs(this.x - (cx - ROAD_W / 4)) < 15) d = this.y - (cy + ROAD_W / 2);
                    if (l.dir === 'S' && this.dy > 0 && Math.abs(this.x - (cx + ROAD_W / 4)) < 15) d = (cy - ROAD_W / 2) - this.y;
                    if (l.dir === 'E' && this.dx > 0 && Math.abs(this.y - (cy + ROAD_W / 4)) < 15) d = (cx - ROAD_W / 2) - this.x;
                    if (l.dir === 'W' && this.dx < 0 && Math.abs(this.y - (cy - ROAD_W / 4)) < 15) d = this.x - (cx + ROAD_W / 2);

                    if (d > 0 && d < 80) {
                        if (l.state === 'RED') stop = true;
                        else this.passedLine = true;
                    }
                });

                cars.forEach(o => {
                    if (o === this) return;
                    let d = Infinity;
                    if (this.dx === o.dx && this.dy === o.dy) {
                        if (this.dy < 0) d = this.y - o.y;
                        else if (this.dy > 0) d = o.y - this.y;
                        else if (this.dx > 0) d = o.x - this.x;
                        else if (this.dx < 0) d = this.x - o.x;
                    }
                    if (d > 0 && d < 70) stop = true;
                });

                this.stopped = stop;
                if (!this.stopped) { this.x += this.dx * this.speed; this.y += this.dy * this.speed; }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(-this.w / 2 + 4, -this.h / 2 + 4, this.w, this.h);
                ctx.fillStyle = this.color;

                const r = 8;
                ctx.beginPath();
                ctx.moveTo(-this.w / 2 + r, -this.h / 2); ctx.lineTo(this.w / 2 - r, -this.h / 2);
                ctx.quadraticCurveTo(this.w / 2, -this.h / 2, this.w / 2, -this.h / 2 + r);
                ctx.lineTo(this.w / 2, this.h / 2 - r); ctx.quadraticCurveTo(this.w / 2, this.h / 2, this.w / 2 - r, this.h / 2);
                ctx.lineTo(-this.w / 2 + r, this.h / 2); ctx.quadraticCurveTo(-this.w / 2, this.h / 2, -this.w / 2, this.h / 2 - r);
                ctx.lineTo(-this.w / 2, -this.h / 2 + r); ctx.quadraticCurveTo(-this.w / 2, -this.h / 2, -this.w / 2 + r, -this.h / 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawn() {
            const cx = W / 2; const cy = H / 2;
            const pos = [
                { x: cx - ROAD_W / 4, y: H + 60, dx: 0, dy: -1, c: '#48cae4' },
                { x: cx + ROAD_W / 4, y: -60, dx: 0, dy: 1, c: '#f72585' },
                { x: -60, y: cy + ROAD_W / 4, dx: 1, dy: 0, c: '#4ade80' },
                { x: W + 60, y: cy - ROAD_W / 4, dx: -1, dy: 0, c: '#ffb703' }
            ];
            const p = pos[Math.floor(Math.random() * 4)];
            cars.push(new Car(p.x, p.y, p.dx, p.dy, p.c));
        }

        function update(time) {
            if (gameState === 'PLAYING') {
                if (time - lastTick > 1000) {
                    timeLeft--; lastTick = time; timeEl.innerText = timeLeft;
                    if (timeLeft <= 10) timeEl.classList.add('urgent');
                    if (timeLeft <= 0) nextLevel();
                }
                if (time - lastSpawn > spawnRate) { spawn(); lastSpawn = time; }

                for (let i = cars.length - 1; i >= 0; i--) {
                    const c = cars[i]; c.update();
                    for (let j = i - 1; j >= 0; j--) {
                        if (Math.abs(c.x - cars[j].x) < 30 && Math.abs(c.y - cars[j].y) < 30) gameOver();
                    }
                    if (c.x < -120 || c.x > W + 120 || c.y < -120 || c.y > H + 120) {
                        cars.splice(i, 1); score++; scoreEl.innerText = score;
                    }
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            drawMap();
            cars.forEach(c => c.draw());
            lights.forEach(l => {
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(l.x, l.y, LIGHT_R + 5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = l.state === 'RED' ? '#ff3333' : '#33ff33';
                ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(l.x, l.y, LIGHT_R, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function nextLevel() {
            level++; timeLeft = 60; spawnRate = Math.max(600, spawnRate * 0.82);
            levelEl.innerText = level; notification.innerText = `LEVEL ${level}!`;
            notification.classList.add('show'); setTimeout(() => notification.classList.remove('show'), 2000);
        }

        function gameOver() {
            gameState = 'GAMEOVER'; overlay.classList.remove('hidden');
            titleEl.innerText = "FIM DE JOGO"; titleEl.style.color = "var(--danger)";
            descEl.innerText = `Você salvou ${score} carros!`;
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const scaleY = H / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            lights.forEach(l => {
                if (Math.hypot(mx - l.x, my - l.y) < LIGHT_R + 20) l.state = (l.state === 'RED' ? 'GREEN' : 'RED');
            });
        });

        initLights();
        requestAnimationFrame(update);
    </script>
</body>

</html>
