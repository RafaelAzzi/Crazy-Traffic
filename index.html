<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Traffic Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --bg-grass: #2d5a27;
            --road-color: #333;
            --road-line: #fff;
            --ui-bg: rgba(255, 255, 255, 0.1);
            --ui-blur: 12px;
            --text-color: #fff;
            --primary: #4cc9f0;
            --danger: #f72585;
            --success: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1000px;
            max-height: 800px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            background-color: var(--bg-grass);
            overflow: hidden;
            border-radius: 12px;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-card {
            background: var(--ui-bg);
            backdrop-filter: blur(var(--ui-blur));
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            font-weight: 700;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
        }

        .stat-value.urgent {
            color: var(--danger);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 20px;
        }

        #overlay h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        #overlay p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 500px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #3f37c9);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .hidden {
            display: none !important;
        }

        #notification {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: #000;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 900;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        #notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-20px);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="hud">
            <div class="stat-card">
                <span class="stat-label">Level</span>
                <span id="level-val" class="stat-value">1</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Time Left</span>
                <span id="time-val" class="stat-value">60</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Score</span>
                <span id="score-val" class="stat-value">0</span>
            </div>
        </div>

        <div id="overlay">
            <h1 id="title">Crazy Traffic</h1>
            <p id="description">Controle os semáforos clicando neles. Não deixe os carros baterem!</p>
            <button id="start-btn" class="btn">Começar Jogo</button>
        </div>

        <div id="notification">Level Up!</div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const timeEl = document.getElementById('time-val');
        const levelEl = document.getElementById('level-val');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('description');
        const notification = document.getElementById('notification');

        // Helper para compatibilidade de cantos arredondados
        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        // Configurações
        const CAR_WIDTH = 30;
        const CAR_HEIGHT = 50;
        const ROAD_WIDTH = 120;
        const LIGHT_RADIUS = 15;
        const STOP_LINE_OFFSET = 70;

        let gameState = 'MENU';
        let score = 0;
        let timeLeft = 60;
        let level = 1;
        let spawnRate = 2000;
        let lastSpawnTime = 0;
        let lastTimeTick = 0;
        let cars = [];
        let trafficLights = [];

        function resize() {
            canvas.width = document.getElementById('game-container').offsetWidth;
            canvas.height = document.getElementById('game-container').offsetHeight;
            initTrafficLights();
        }

        window.addEventListener('resize', resize);
        resize();

        class TrafficLight {
            constructor(x, y, direction) {
                this.x = x;
                this.y = y;
                this.direction = direction;
                this.state = 'RED';
                this.radius = LIGHT_RADIUS;
            }

            draw() {
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = this.state === 'RED' ? '#ff3333' : '#33ff33';
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(this.x - 3, this.y - 3, this.radius / 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            isClicked(mx, my) {
                const dist = Math.hypot(mx - this.x, my - this.y);
                return dist < this.radius + 15;
            }

            toggle() {
                this.state = this.state === 'RED' ? 'GREEN' : 'RED';
            }
        }

        class Car {
            constructor(x, y, dir, speed, color) {
                this.x = x;
                this.y = y;
                this.dir = dir;
                this.speed = speed;
                this.color = color;
                this.stopped = false;
                this.width = dir.x !== 0 ? CAR_HEIGHT : CAR_WIDTH;
                this.height = dir.y !== 0 ? CAR_HEIGHT : CAR_WIDTH;
                this.passedStopLine = false;
            }

            update(cars, lights) {
                if (gameState !== 'PLAYING') return;

                let shouldStop = false;

                lights.forEach(light => {
                    const stopLine = getStopLine(light);
                    if (!this.passedStopLine && isHeadingTowards(this, stopLine)) {
                        const dist = distanceToStopLine(this, stopLine);
                        if (dist > 0 && dist < STOP_LINE_OFFSET) {
                            if (light.state === 'RED') shouldStop = true;
                        }
                        if (dist < 0 && !shouldStop) this.passedStopLine = true;
                    }
                });

                cars.forEach(other => {
                    if (other === this) return;
                    if (isCarAhead(this, other)) {
                        const dist = distanceToCar(this, other);
                        if (dist > 0 && dist < 50) shouldStop = true;
                    }
                });

                this.stopped = shouldStop;
                if (!this.stopped) {
                    this.x += this.dir.x * this.speed;
                    this.y += this.dir.y * this.speed;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(-this.width / 2 + 4, -this.height / 2 + 4, this.width, this.height);

                ctx.fillStyle = this.color;
                drawRoundedRect(ctx, -this.width / 2, -this.height / 2, this.width, this.height, 6);

                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(-this.width / 2 + 5, -this.height / 2 + 10, this.width - 10, this.height - 20);

                ctx.fillStyle = '#ffffaa';
                if (this.dir.y < 0) {
                    ctx.fillRect(-this.width / 2 + 4, -this.height / 2 + 2, 6, 4);
                    ctx.fillRect(this.width / 2 - 10, -this.height / 2 + 2, 6, 4);
                } else if (this.dir.y > 0) {
                    ctx.fillRect(-this.width / 2 + 4, this.height / 2 - 6, 6, 4);
                    ctx.fillRect(this.width / 2 - 10, this.height / 2 - 6, 6, 4);
                } else if (this.dir.x < 0) {
                    ctx.fillRect(-this.width / 2 + 2, -this.height / 2 + 4, 4, 6);
                    ctx.fillRect(-this.width / 2 + 2, this.height / 2 - 10, 4, 6);
                } else if (this.dir.x > 0) {
                    ctx.fillRect(this.width / 2 - 6, -this.height / 2 + 4, 4, 6);
                    ctx.fillRect(this.width / 2 - 6, this.height / 2 - 10, 4, 6);
                }
                ctx.restore();
            }

            getBounds() {
                return {
                    left: this.x - this.width / 2,
                    right: this.x + this.width / 2,
                    top: this.y - this.height / 2,
                    bottom: this.y + this.height / 2
                };
            }
        }

        function getStopLine(light) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const offset = ROAD_WIDTH / 2;
            switch (light.direction) {
                case 'N': return { x: cx - ROAD_WIDTH / 4, y: cy + offset, dir: 'UP' };
                case 'S': return { x: cx + ROAD_WIDTH / 4, y: cy - offset, dir: 'DOWN' };
                case 'E': return { x: cx - offset, y: cy + ROAD_WIDTH / 4, dir: 'RIGHT' };
                case 'W': return { x: cx + offset, y: cy - ROAD_WIDTH / 4, dir: 'LEFT' };
            }
        }

        function isHeadingTowards(car, line) {
            if (line.dir === 'UP' && car.dir.y < 0 && Math.abs(car.x - line.x) < 20) return true;
            if (line.dir === 'DOWN' && car.dir.y > 0 && Math.abs(car.x - line.x) < 20) return true;
            if (line.dir === 'RIGHT' && car.dir.x > 0 && Math.abs(car.y - line.y) < 20) return true;
            if (line.dir === 'LEFT' && car.dir.x < 0 && Math.abs(car.y - line.y) < 20) return true;
            return false;
        }

        function distanceToStopLine(car, line) {
            if (line.dir === 'UP') return car.y - line.y;
            if (line.dir === 'DOWN') return line.y - car.y;
            if (line.dir === 'RIGHT') return line.x - car.x;
            if (line.dir === 'LEFT') return car.x - line.x;
            return Infinity;
        }

        function isCarAhead(car, other) {
            if (Math.abs(car.x - other.x) < 20 && car.dir.y !== 0 && car.dir.y === other.dir.y) {
                const distY = (car.y - other.y) * -car.dir.y;
                return distY > 0;
            }
            if (Math.abs(car.y - other.y) < 20 && car.dir.x !== 0 && car.dir.x === other.dir.x) {
                const distX = (car.x - other.x) * -car.dir.x;
                return distX > 0;
            }
            return false;
        }

        function distanceToCar(car, other) {
            if (car.dir.y !== 0) return Math.abs(car.y - other.y) - CAR_HEIGHT;
            if (car.dir.x !== 0) return Math.abs(car.x - other.x) - CAR_HEIGHT;
            return Infinity;
        }

        function checkCollision(c1, c2) {
            const b1 = c1.getBounds();
            const b2 = c2.getBounds();
            const p = -3;
            return !(b1.left > b2.right + p || b1.right < b2.left - p || b1.top > b2.bottom + p || b1.bottom < b2.top - p);
        }

        function initTrafficLights() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const offset = ROAD_WIDTH / 2 + 30;
            trafficLights = [
                new TrafficLight(cx - offset, cy + ROAD_WIDTH / 2 + 20, 'N'),
                new TrafficLight(cx + offset, cy - ROAD_WIDTH / 2 - 20, 'S'),
                new TrafficLight(cx - ROAD_WIDTH / 2 - 20, cy - offset, 'E'),
                new TrafficLight(cx + ROAD_WIDTH / 2 + 20, cy + offset, 'W')
            ];
        }

        function drawMap() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333';
            ctx.fillRect(cx - ROAD_WIDTH / 2, 0, ROAD_WIDTH, canvas.height);
            ctx.fillRect(0, cy - ROAD_WIDTH / 2, canvas.width, ROAD_WIDTH);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(cx, 0); ctx.lineTo(cx, cy - ROAD_WIDTH / 2);
            ctx.moveTo(cx, cy + ROAD_WIDTH / 2); ctx.lineTo(cx, canvas.height);
            ctx.moveTo(0, cy); ctx.lineTo(cx - ROAD_WIDTH / 2, cy);
            ctx.moveTo(cx + ROAD_WIDTH / 2, cy); ctx.lineTo(canvas.width, cy);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.moveTo(cx - ROAD_WIDTH / 2, cy + ROAD_WIDTH / 2); ctx.lineTo(cx, cy + ROAD_WIDTH / 2);
            ctx.moveTo(cx, cy - ROAD_WIDTH / 2); ctx.lineTo(cx + ROAD_WIDTH / 2, cy - ROAD_WIDTH / 2);
            ctx.moveTo(cx - ROAD_WIDTH / 2, cy); ctx.lineTo(cx - ROAD_WIDTH / 2, cy - ROAD_WIDTH / 2);
            ctx.moveTo(cx + ROAD_WIDTH / 2, cy); ctx.lineTo(cx + ROAD_WIDTH / 2, cy + ROAD_WIDTH / 2);
            ctx.stroke();
        }

        function spawnCar() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const dirs = [
                { x: cx - ROAD_WIDTH / 4, y: canvas.height + 50, dx: 0, dy: -1, color: '#4cc9f0' },
                { x: cx + ROAD_WIDTH / 4, y: -50, dx: 0, dy: 1, color: '#f72585' },
                { x: -50, y: cy + ROAD_WIDTH / 4, dx: 1, dy: 0, color: '#4ade80' },
                { x: canvas.width + 50, y: cy - ROAD_WIDTH / 4, dx: -1, dy: 0, color: '#ffb703' }
            ];
            const cfg = dirs[Math.floor(Math.random() * dirs.length)];
            const speed = 2 + (level * 0.4);
            cars.push(new Car(cfg.x, cfg.y, { x: cfg.dx, y: cfg.dy }, speed, cfg.color));
        }

        function update(time) {
            if (gameState === 'PLAYING') {
                if (time - lastTimeTick > 1000) {
                    timeLeft--;
                    lastTimeTick = time;
                    timeEl.innerText = timeLeft;
                    if (timeLeft <= 10) timeEl.classList.add('urgent');
                    else timeEl.classList.remove('urgent');
                    if (timeLeft <= 0) nextLevel();
                }
                if (time - lastSpawnTime > spawnRate) {
                    spawnCar();
                    lastSpawnTime = time;
                }
                for (let i = cars.length - 1; i >= 0; i--) {
                    const car = cars[i];
                    car.update(cars, trafficLights);
                    for (let j = i - 1; j >= 0; j--) {
                        if (checkCollision(car, cars[j])) gameOver();
                    }
                    if (car.x < -100 || car.x > canvas.width + 100 || car.y < -100 || car.y > canvas.height + 100) {
                        cars.splice(i, 1);
                        score++;
                        scoreEl.innerText = score;
                    }
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMap();
            cars.forEach(car => car.draw());
            trafficLights.forEach(light => light.draw());
        }

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            timeLeft = 60;
            level = 1;
            spawnRate = 2000;
            cars = [];
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            levelEl.innerText = level;
            overlay.classList.add('hidden');
            lastSpawnTime = performance.now();
            lastTimeTick = performance.now();
            initTrafficLights();
        }

        function nextLevel() {
            level++;
            timeLeft = 60;
            spawnRate = Math.max(500, spawnRate * 0.85);
            levelEl.innerText = level;
            notification.innerText = `Level ${level}!`;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 2000);
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            overlay.classList.remove('hidden');
            titleEl.innerText = "GAME OVER";
            titleEl.style.color = "var(--danger)";
            descEl.innerText = `Sua pontuação final: ${score} carros!`;
            startBtn.innerText = "Tentar Novamente";
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            trafficLights.forEach(light => {
                if (light.isClicked(mx, my)) light.toggle();
            });
        });

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startGame();
        });

        requestAnimationFrame(update);
    </script>
</body>

</html>
