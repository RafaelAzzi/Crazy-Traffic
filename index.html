<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Traffic Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --bg-grass: #2d5a27;
            --road: #444;
            --ui-bg: rgba(255, 255, 255, 0.1);
            --primary: #4cc9f0;
            --danger: #f72585;
            --success: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #111;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        #game-container {
            position: relative;
            width: 1000px;
            height: 800px;
            background-color: var(--bg-grass);
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 1000px;
            height: 800px;
        }

        /* UI */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-card {
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.7;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 900;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
            text-align: center;
            padding: 40px;
        }

        #overlay h1 {
            font-size: 5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #3f37c9);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
            transition: 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        #notification {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: #000;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 900;
            z-index: 50;
            opacity: 0;
            transition: 0.4s;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="hud">
            <div class="stat-card">
                <div class="stat-label">Nível</div>
                <div id="level-val" class="stat-value">1</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tempo</div>
                <div id="time-val" class="stat-value">45</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div id="score-val" class="stat-value">0</div>
            </div>
        </div>

        <div id="overlay">
            <h1 id="title">Crazy Traffic</h1>
            <p id="description">Controle os semáforos clicando neles!</p>
            <button id="start-btn" class="btn" onclick="startGame()">Começar Jogo</button>
        </div>

        <div id="notification">LEVEL UP!</div>
        <canvas id="gameCanvas" width="1000" height="800"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const timeEl = document.getElementById('time-val');
        const levelEl = document.getElementById('level-val');
        const overlay = document.getElementById('overlay');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('description');
        const startBtn = document.getElementById('start-btn');
        const noticeEl = document.getElementById('notification');

        // Configurações
        const W = 1000;
        const H = 800;
        const ROAD_W = 150;
        const LIGHT_R = 20;
        const CAR_W = 35;
        const CAR_H = 60;

        let gameState = 'MENU';
        let score = 0, timeLeft = 45, level = 1, spawnRate = 2200;
        let lastSpawn = 0, lastTick = 0;
        let cars = [], lights = [];

        function initLights() {
            const cx = W / 2, cy = H / 2, off = ROAD_W / 2 + 40;
            lights = [
                { x: cx - off, y: cy + ROAD_W / 2 + 30, dir: 'N', state: 'RED' },
                { x: cx + off, y: cy - ROAD_W / 2 - 30, dir: 'S', state: 'RED' },
                { x: cx - ROAD_W / 2 - 30, y: cy - off, dir: 'E', state: 'RED' },
                { x: cx + ROAD_W / 2 + 30, y: cy + off, dir: 'W', state: 'RED' }
            ];
        }

        function startGame() {
            gameState = 'PLAYING';
            score = 0; timeLeft = 45; level = 1; spawnRate = 2200;
            cars = [];
            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;
            levelEl.innerText = level;
            overlay.classList.add('hidden');
            lastTick = performance.now();
            lastSpawn = 0;
            initLights();
        }

        function drawMap() {
            const cx = W / 2, cy = H / 2;

            // Grama base (Cor principal do fundo)
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, W, H);

            // -- DECORAÇÃO DO CENÁRIO (SIMPLES E VISÍVEL) --
            // Função para desenhar casas simples
            function drawHouse(x, y, color) {
                // Corpo da casa
                ctx.fillStyle = color;
                ctx.fillRect(x, y, 60, 50);
                // Telhado
                ctx.fillStyle = '#7b241c';
                ctx.beginPath();
                ctx.moveTo(x - 10, y);
                ctx.lineTo(x + 30, y - 25);
                ctx.lineTo(x + 70, y);
                ctx.fill();
                // Porta
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(x + 20, y + 20, 20, 30);
                // Janelas
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(x + 5, y + 10, 10, 10);
                ctx.fillRect(x + 45, y + 10, 10, 10);
            }

            // Casas nos cantos
            drawHouse(100, 100, '#f4d03f');
            drawHouse(820, 100, '#5dade2');
            drawHouse(120, 650, '#eb984e');
            drawHouse(800, 680, '#a569bd');

            // Função para desenhar árvores simples
            function drawTree(x, y) {
                // Tronco
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(x - 6, y, 12, 25);
                // Folhas (Círculo verde grande)
                ctx.fillStyle = '#1b5e20';
                ctx.beginPath();
                ctx.arc(x, y - 10, 25, 0, Math.PI * 2);
                ctx.fill();
            }

            // Árvores espalhadas
            const trees = [[250, 150], [700, 120], [150, 380], [820, 450], [300, 600], [650, 720], [450, 100], [550, 700]];
            trees.forEach(t => drawTree(t[0], t[1]));
            // ------------------------------------

            // Estradas
            ctx.fillStyle = '#3c3c3c';
            ctx.fillRect(cx - ROAD_W / 2, 0, ROAD_W, H); // Vertical
            ctx.fillRect(0, cy - ROAD_W / 2, W, ROAD_W); // Horizontal

            // Faixas brancas intercaladas
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(cx, 0); ctx.lineTo(cx, cy - ROAD_W / 2);
            ctx.moveTo(cx, cy + ROAD_W / 2); ctx.lineTo(cx, H);
            ctx.moveTo(0, cy); ctx.lineTo(cx - ROAD_W / 2, cy);
            ctx.moveTo(cx + ROAD_W / 2, cy); ctx.lineTo(W, cy);
            ctx.stroke();

            // Faixas de Pare
            ctx.setLineDash([]); ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.moveTo(cx - ROAD_W / 2, cy + ROAD_W / 2); ctx.lineTo(cx, cy + ROAD_W / 2);
            ctx.moveTo(cx, cy - ROAD_W / 2); ctx.lineTo(cx + ROAD_W / 2, cy - ROAD_W / 2);
            ctx.moveTo(cx - ROAD_W / 2, cy); ctx.lineTo(cx - ROAD_W / 2, cy - ROAD_W / 2);
            ctx.moveTo(cx + ROAD_W / 2, cy); ctx.lineTo(cx + ROAD_W / 2, cy + ROAD_W / 2);
            ctx.stroke();
        }

        function spawnCar() {
            const cx = W / 2, cy = H / 2;
            const setups = [
                { x: cx - ROAD_W / 4, y: H + 60, dx: 0, dy: -1, c: '#48cae4' },
                { x: cx + ROAD_W / 4, y: -60, dx: 0, dy: 1, c: '#f72585' },
                { x: -60, y: cy + ROAD_W / 4, dx: 1, dy: 0, c: '#4ade80' },
                { x: W + 60, y: cy - ROAD_W / 4, dx: -1, dy: 0, c: '#ffb703' }
            ];
            const s = setups[Math.floor(Math.random() * 4)];
            cars.push({ x: s.x, y: s.y, dx: s.dx, dy: s.dy, color: s.c, speed: 2.5 + (level * 0.4), w: s.dx !== 0 ? CAR_H : CAR_W, h: s.dy !== 0 ? CAR_H : CAR_W });
        }

        function updateCar(car) {
            const cx = W / 2, cy = H / 2;
            let stop = false;

            // Detector de Semáforo
            lights.forEach(l => {
                let d = Infinity;
                if (l.dir === 'N' && car.dy < 0 && Math.abs(car.x - (cx - ROAD_W / 4)) < 15) d = car.y - (cy + ROAD_W / 2);
                if (l.dir === 'S' && car.dy > 0 && Math.abs(car.x - (cx + ROAD_W / 4)) < 15) d = (cy - ROAD_W / 2) - car.y;
                if (l.dir === 'E' && car.dx > 0 && Math.abs(car.y - (cy + ROAD_W / 4)) < 15) d = (cx - ROAD_W / 2) - car.x;
                if (l.dir === 'W' && car.dx < 0 && Math.abs(car.y - (cy - ROAD_W / 4)) < 15) d = car.x - (cx + ROAD_W / 2);
                if (d > 0 && d < 80 && l.state === 'RED') stop = true;
            });

            // Detector de proximidade
            cars.forEach(o => {
                if (o === car) return;
                let d = Infinity;
                if (car.dx === o.dx && car.dy === o.dy) {
                    if (car.dy < 0) d = car.y - o.y; else if (car.dy > 0) d = o.y - car.y;
                    else if (car.dx > 0) d = o.x - car.x; else if (car.dx < 0) d = car.x - o.x;
                }
                if (d > 0 && d < 75) stop = true;
            });

            if (!stop) { car.x += car.dx * car.speed; car.y += car.dy * car.speed; }
        }

        function drawCar(car) {
            ctx.save(); ctx.translate(car.x, car.y);

            // Sombra
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(-car.w / 2 + 4, -car.h / 2 + 4, car.w, car.h);

            // Rodas (Pretas e visíveis nas laterais)
            ctx.fillStyle = '#111';
            const wheelW = 6, wheelH = 12;
            if (car.dy !== 0) { // Carro Vertical
                ctx.fillRect(-car.w / 2 - 2, -car.h / 2 + 10, wheelW, wheelH); // Front Left
                ctx.fillRect(car.w / 2 - 4, -car.h / 2 + 10, wheelW, wheelH);  // Front Right
                ctx.fillRect(-car.w / 2 - 2, car.h / 2 - 22, wheelW, wheelH);  // Rear Left
                ctx.fillRect(car.w / 2 - 4, car.h / 2 - 22, wheelW, wheelH);   // Rear Right
            } else { // Carro Horizontal
                ctx.fillRect(-car.w / 2 + 10, -car.h / 2 - 2, wheelH, wheelW);
                ctx.fillRect(-car.w / 2 + 10, car.h / 2 - 4, wheelH, wheelW);
                ctx.fillRect(car.w / 2 - 22, -car.h / 2 - 2, wheelH, wheelW);
                ctx.fillRect(car.w / 2 - 22, car.h / 2 - 4, wheelH, wheelW);
            }

            // Corpo do Carro
            ctx.fillStyle = car.color;
            const r = 8;
            ctx.beginPath();
            ctx.moveTo(-car.w / 2 + r, -car.h / 2); ctx.lineTo(car.w / 2 - r, -car.h / 2); ctx.quadraticCurveTo(car.w / 2, -car.h / 2, car.w / 2, -car.h / 2 + r);
            ctx.lineTo(car.w / 2, car.h / 2 - r); ctx.quadraticCurveTo(car.w / 2, car.h / 2, car.w / 2 - r, car.h / 2);
            ctx.lineTo(-car.w / 2 + r, car.h / 2); ctx.quadraticCurveTo(-car.w / 2, car.h / 2, -car.w / 2, car.h / 2 - r);
            ctx.lineTo(-car.w / 2, -car.h / 2 + r); ctx.quadraticCurveTo(-car.w / 2, -car.h / 2, -car.w / 2 + r, -car.h / 2);
            ctx.fill();

            // Parabrisas (Dando direção ao carro)
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            if (car.dy < 0) ctx.fillRect(-car.w / 2 + 5, -car.h / 2 + 8, car.w - 10, 10);      // Frente p/ Norte
            else if (car.dy > 0) ctx.fillRect(-car.w / 2 + 5, car.h / 2 - 18, car.w - 10, 10); // Frente p/ Sul
            else if (car.dx > 0) ctx.fillRect(car.w / 2 - 18, -car.h / 2 + 5, 10, car.h - 10); // Frente p/ Leste
            else if (car.dx < 0) ctx.fillRect(-car.w / 2 + 8, -car.h / 2 + 5, 10, car.h - 10); // Frente p/ Oeste

            ctx.restore();
        }

        function loop(time) {
            ctx.clearRect(0, 0, W, H);
            drawMap();

            if (gameState === 'PLAYING') {
                if (time - lastTick > 1000) { timeLeft--; lastTick = time; timeEl.innerText = timeLeft; if (timeLeft <= 0) nextLevel(); }
                if (time - lastSpawn > spawnRate) { spawnCar(); lastSpawn = time; }

                for (let i = cars.length - 1; i >= 0; i--) {
                    updateCar(cars[i]);
                    drawCar(cars[i]);
                    // Colisão
                    for (let j = i - 1; j >= 0; j--) {
                        if (Math.abs(cars[i].x - cars[j].x) < 32 && Math.abs(cars[i].y - cars[j].y) < 32) gameOver();
                    }
                    if (cars[i].x < -150 || cars[i].x > W + 150 || cars[i].y < -150 || cars[i].y > H + 150) { cars.splice(i, 1); score++; scoreEl.innerText = score; }
                }
            } else if (gameState === 'GAMEOVER' || gameState === 'MENU') {
                cars.forEach(drawCar);
            }

            // Desenha semáforos sempre
            lights.forEach(l => {
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(l.x, l.y, LIGHT_R + 6, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = l.state === 'RED' ? '#ff3333' : '#33ff33';
                ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath(); ctx.arc(l.x, l.y, LIGHT_R, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(loop);
        }

        function nextLevel() {
            level++; timeLeft = 45; spawnRate = Math.max(600, spawnRate * 0.82);
            levelEl.innerText = level; noticeEl.style.opacity = '1';
            setTimeout(() => noticeEl.style.opacity = '0', 2000);
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            overlay.classList.remove('hidden');
            titleEl.innerText = "GAME OVER";
            descEl.innerText = `Você salvou ${score} carros!`;
            startBtn.innerText = "Tentar Novamente";
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect(), mx = (e.clientX - rect.left) * (W / rect.width), my = (e.clientY - rect.top) * (H / rect.height);
            lights.forEach(l => { if (Math.hypot(mx - l.x, my - l.y) < LIGHT_R + 25) l.state = (l.state === 'RED' ? 'GREEN' : 'RED'); });
        });

        initLights();
        requestAnimationFrame(loop);
    </script>
</body>

</html>
